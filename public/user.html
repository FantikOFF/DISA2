<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Встречи | DISA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ====================== ШАПКА ====================== */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #111111;
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
      z-index: 1000;
    }

    .logo { font-size: 28px; font-weight: 700; color: #007bff; }

    .main-nav a {
      padding: 12px 20px;
      color: #bbbbbb;
      text-decoration: none;
      margin-right: 8px;
      border-radius: 6px;
    }

    .main-nav a:hover,
    .main-nav a.active {
      color: white;
      background: #1f1f1f;
    }

    /* ====================== ФИЛЬТРЫ ====================== */
    .filters {
      position: fixed;
      top: 85px;
      left: 0; right: 0;
      background: #111111;
      padding: 18px 40px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: end;
      gap: 20px;
      z-index: 999;
    }

    .filter-group label {
      font-size: 13px;
      color: #888;
      margin-bottom: 5px;
      display: block;
    }

    .filter-group select,
    .filter-group input {
      background: #1f1f1f;
      border: 1px solid #333;
      color: white;
      padding: 10px 14px;
      border-radius: 6px;
      min-width: 170px;
    }

    .apply-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    .apply-btn:hover { background: #005fcc; }

    .reset-btn {
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }

    .reset-btn:hover { background: #333; color: white; }

    /* ====================== ТАБЛИЦА ====================== */
    .content {
      margin-top: 170px;
      padding: 0 40px 60px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111111;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #1a1a1a;
      padding: 16px 12px;
      text-align: left;
      font-weight: 500;
      color: #ccc;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #222;
    }

    tr:hover {
      background: #1a1a1a;
    }

    .status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status.Новая { background: #ffc107; color: black; }
    .status.В_работе { background: #17a2b8; color: white; }

    /* Кнопки "Открыть" */
    .open-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
    }

    .open-btn:hover {
      background: #005fcc;
    }

    /* ====================== ПАГИНАЦИЯ ====================== */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 40px;
    }

    .pagination button {
      width: 40px;
      height: 40px;
      background: #1f1f1f;
      color: #ddd;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .pagination button:hover:not(:disabled) {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }

    .pagination button.active {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    /* Кнопка "Выйти" */
.logout-btn {
    background: #e74c3c;           /* красный цвет */
    color: white;
    border: none;
    padding: 9px 22px;
    border-radius: 6px;
    font-size: 14.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3);
}

.logout-btn:hover {
    background: #c0392b;
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4);
}

.logout-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 4px rgba(231, 76, 60, 0.3);
}
</style>
</head>
<body>

  <!-- Шапка -->
  <div class="header">
    <div><span class="logo">DISA DMW</span></div>
    <div class="main-nav">
      <a href="#" class="active">Встречи</a>
      <a href="#">Отчеты</a>
      <a href="#">Пакеты</a>
      <a href="#">Спец.предложения</a>
      <a href="#">Опросы</a>
      <a href="#">Настройки</a>
    </div>
    <div>
      <span style="color:#00ff9d; margin-right:12px;">👤</span>
      <span id="username">Пользователь</span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab active" id="allTab">Все встречи</button>
    <button class="tab" id="myTab">Мои встречи</button>
  </div>

  <!-- Фильтры -->
  <div class="filters">
    <div class="filter-group">
        <label>Статус</label>
        <select id="statusFilter">
            <option value="">Все</option>
            <option value="Новая">Новая</option>
            <option value="В_работе">В работе</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Тип</label>
        <select id="typeFilter">
            <option value="">Все</option>
            <option value="Ремонт">Ремонт</option>
            <option value="Осмотр">Осмотр</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Дата приёма</label>
        <input type="date" id="dateFilter">
    </div>

    <button id="applyFilters" class="apply-btn">Применить</button>
    <button id="resetFilters" class="reset-btn">Сбросить</button>
  </div>

  <!-- Контент -->
  <div class="content">
    <h2 id="pageTitle">Все встречи</h2>

    <table id="meetingsTable">
      <thead>
        <tr>
          <th>Статус</th>
          <th>Тип</th>
          <th>№ п/п</th>
          <th>Дата приёма</th>
          <th>Модель</th>
          <th>Марка</th>
          <th>Гос. номер</th>
          <th>VIN</th>
          <th>Клиент</th>
          <th>Причина обращения</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    let currentPage = 1;
    const itemsPerPage = 10;

    const sampleData = [
      {status:"Новая", type:"Ремонт", number:"001", date:"2026-03-12", displayDate:"12.03.2026", model:"Camry", brand:"Toyota", licensePlate:"A123BC", vin:"JT2BF22K610123456", client:"Иванов Сергей", reason:"Не заводится"},
      {status:"В_работе", type:"Осмотр", number:"002", date:"2026-03-13", displayDate:"13.03.2026", model:"Focus", brand:"Ford", licensePlate:"X777XX", vin:"", client:"Петров Алексей", reason:"Плановое ТО"},
      ...Array(30).fill().map((_, i) => ({
        status: i % 3 === 0 ? "Новая" : "В_работе",
        type: i % 2 === 0 ? "Ремонт" : "Осмотр",
        number: String(100 + i).padStart(3, '0'),
        date: "2026-03-" + String(10 + (i % 20)).padStart(2, '0'),
        displayDate: "15.03.2026",
        model: "Model " + (i+1),
        brand: "Brand",
        licensePlate: "A" + (100 + i) + "BC",
        vin: "-",
        client: "Клиент " + (i+1),
        reason: "Причина " + (i+1)
      }))
    ];

    function renderTable(filteredData = sampleData) {
      const tbody = document.querySelector('#meetingsTable tbody');
      tbody.innerHTML = '';

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageData = filteredData.slice(start, end);

      pageData.forEach(item => {
        const row = document.createElement('tr');
        row.dataset.status = item.status;
        row.dataset.type = item.type;
        row.dataset.date = item.date;   // YYYY-MM-DD для фильтра

        row.innerHTML = `
          <td><span class="status ${item.status}">${item.status}</span></td>
          <td>${item.type}</td>
          <td>${item.number}</td>
          <td>${item.displayDate}</td>
          <td>${item.model}</td>
          <td>${item.brand}</td>
          <td>${item.licensePlate}</td>
          <td>${item.vin}</td>
          <td>${item.client}</td>
          <td>${item.reason}</td>
          <td><button class="open-btn" style="background:#007bff;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">Открыть</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function applyFilters() {
      const status = document.getElementById('statusFilter').value;
      const type   = document.getElementById('typeFilter').value;
      const date   = document.getElementById('dateFilter').value;

      const filtered = sampleData.filter(item => {
        return (!status || item.status === status) &&
               (!type   || item.type   === type) &&
               (!date   || item.date   === date);
      });

      currentPage = 1;
      renderTable(filtered);
      renderPagination(filtered.length);
    }

    function resetFilters() {
      document.getElementById('statusFilter').value = '';
      document.getElementById('typeFilter').value = '';
      document.getElementById('dateFilter').value = '';
      currentPage = 1;
      renderTable(sampleData);
      renderPagination(sampleData.length);
    }

    function renderPagination(totalItems = sampleData.length) {
  const totalPages = Math.ceil(totalItems / itemsPerPage);
  const pagination = document.getElementById('pagination');
  pagination.innerHTML = '';

  // Кнопка Назад
  const prevBtn = document.createElement('button');
  prevBtn.innerHTML = '‹';
  prevBtn.disabled = currentPage === 1;
  prevBtn.onclick = () => changePage(currentPage - 1);
  pagination.appendChild(prevBtn);

  // Номера страниц
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    if (i === currentPage) btn.classList.add('active');
    btn.onclick = () => changePage(i);
    pagination.appendChild(btn);
  }

  // Кнопка Вперёд
  const nextBtn = document.createElement('button');
  nextBtn.innerHTML = '›';
  nextBtn.disabled = currentPage === totalPages;
  nextBtn.onclick = () => changePage(currentPage + 1);
  pagination.appendChild(nextBtn);
}

    function changePage(page) {
      if (page < 1 || page > Math.ceil(sampleData.length / itemsPerPage)) return;
      currentPage = page;
      renderTable(sampleData);
      renderPagination();
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('username').textContent = localStorage.getItem('username') || 'Администратор';
      
      renderTable();
      renderPagination();

      // Привязка фильтров
      document.getElementById('applyFilters').addEventListener('click', applyFilters);
      document.getElementById('resetFilters').addEventListener('click', resetFilters);
    });
  </script>
</body>
</html>
