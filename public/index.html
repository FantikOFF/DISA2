<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в систему</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
    form { max-width: 400px; margin: 0 auto; }
    input { padding: 10px; margin: 10px 0; width: 100%; font-size: 16px; }
    button { padding: 12px; width: 100%; font-size: 18px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    .message { margin-top: 15px; color: red; }
  </style>
</head>
<body>
  <h1>Вход в DISA</h1>
  
  <form id="loginForm">
    <input type="text" id="username" placeholder="Логин" required>
    <input type="password" id="password" placeholder="Пароль" required>
    <button type="submit">Войти</button>
  </form>

  <div class="message" id="message"></div>

  <script>
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        messageDiv.textContent = "Заполните все поля";
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          // Сохраняем токен
          localStorage.setItem('token', data.token);
          
          messageDiv.style.color = 'green';
          messageDiv.textContent = 'Вход выполнен успешно!';

          // Перенаправляем в зависимости от роли
          if (data.user.role === 'admin') {
            setTimeout(() => {
              window.location.href = '/admin.html';
            }, 1000);
          } else {
            setTimeout(() => {
              window.location.href = '/user.html';
            }, 1000);
          }
        } else {
          messageDiv.style.color = 'red';
          messageDiv.textContent = data.message || 'Ошибка входа';
        }
      } catch (err) {
        messageDiv.style.color = 'red';
        messageDiv.textContent = 'Ошибка соединения с сервером';
      }
    });
  </script>
</body>
</html>
